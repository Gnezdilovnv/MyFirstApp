plugins {
    id "com.android.application"
}

android {
    namespace "com.example.myfirstapp"
    compileSdk 34
    
    defaultConfig {
        applicationId "com.example.myfirstapp"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            debuggable true
        }
    }
}

dependencies {
    implementation "androidx.appcompat:appcompat:1.6.1"
}